apiVersion: v2
name: prowler
description: Prowler is an Open Cloud Security tool for AWS, Azure, GCP and Kubernetes. It helps for continuous monitoring, security assessments and audits, incident response, compliance, hardening and forensics readiness. 
type: application
version: 0.0.3
appVersion: "5.19.0"
home: https://prowler.com/
icon: https://promptlylabs.github.io/prowler-helm-chart/docs/images/prowler-icon.jpeg
keywords:
  - security
  - aws
  - azure
  - gcp
  - kubernetes
maintainers:
  - name: Dani
    email: andre.gomes@promptlyhealth.com
dependencies:
  # https://artifacthub.io/packages/helm/bitnami/postgresql
  - name: postgresql
    version: 18.5.2
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  # https://artifacthub.io/packages/helm/bitnami/valkey
  - name: valkey
    version: 5.4.3
    repository: https://charts.bitnami.com/bitnami
    condition: valkey.enabled
  # https://artifacthub.io/packages/helm/neo4j-helm-charts/neo4j
  - name: neo4j
    version: 2026.1.4
    repository: https://neo4j.github.io/helm-charts/
    condition: neo4j.enabled
annotations: 
  artifacthub.io/alternativeName: prowler-app
  artifacthub.io/category: security
  artifacthub.io/links: |
    - name: source
      url: https://github.com/promptlylabs/prowler-helm-chart
    - name: application source
      url: https://github.com/prowler-cloud/prowler
    - name: support
      url: https://github.com/promptlylabs/prowler-helm-chart/issues
  artifacthub.io/changes: |
    - kind: added
      description: Neo4j dependency and configuration for attack paths feature
    - kind: added
      description: New Django/Celery environment variables (throttle, retry, attack paths)
    - kind: added
      description: NEXT_PUBLIC_API_BASE_URL in UI configmap
    - kind: changed
      description: Updated appVersion to 5.19.0
    - kind: changed
      description: Updated PostgreSQL dependency to 18.5.2
    - kind: changed
      description: Updated Valkey dependency to 5.4.3
    - kind: fixed
      description: ServiceAccount helper templates referencing wrong values
    - kind: fixed
      description: HPA scaleTargetRef pointing to incorrect deployment names
